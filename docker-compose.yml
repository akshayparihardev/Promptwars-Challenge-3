# =============================================================================
# EcoAgent Docker Compose — Development Environment
#
# Why separate services in dev: allows independent hot-reloading of frontend
# and backend without rebuilding the entire Docker image on every change.
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-builder
    command: npm run dev
    working_dir: /app/frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

  # Production-like single container
  production:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:8080"
    env_file:
      - .env
    profiles:
      - prod
