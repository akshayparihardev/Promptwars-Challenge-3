server {
    listen 8080;
    server_name localhost;

    # Serve Next.js static export from /usr/share/nginx/html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Reverse proxy all /api/* requests to the FastAPI backend
    # Why: keeps frontend and API on the same origin in production,
    # eliminating CORS entirely and hiding the backend port.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip for reduced payload size
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
